<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Connections -->
  <path d="M 200 220 L 100 120" stroke="currentColor" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" />
  <path d="M 200 220 L 200 90" stroke="currentColor" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" />
  <path d="M 200 220 L 300 120" stroke="currentColor" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" />
  
  <!-- Central App Store Box -->
  <g transform="translate(160, 180)">
    <path d="M 40 0 L 80 20 L 40 40 L 0 20 Z" fill="currentColor" fill-opacity="0.4" />
    <path d="M 0 20 L 40 40 L 40 80 L 0 60 Z" fill="currentColor" fill-opacity="0.8" />
    <path d="M 80 20 L 40 40 L 40 80 L 80 60 Z" fill="currentColor" fill-opacity="0.6" />
    <!-- App icon inside -->
    <circle cx="40" cy="20" r="6" fill="currentColor" fill-opacity="0.9" />
  </g>

  <!-- Left OS Screen -->
  <g transform="translate(30, 40)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.7"/>
    <rect x="0" y="55" width="100" height="15" rx="0" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="15" cy="62.5" r="3" fill="currentColor" fill-opacity="0.8"/>
    <!-- Screen Stand -->
    <path d="M 40 70 L 30 90 L 70 90 L 60 70 Z" fill="currentColor" fill-opacity="0.5"/>
  </g>

  <!-- Center OS Screen -->
  <g transform="translate(150, 10)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.7"/>
    <!-- Window inside -->
    <rect x="20" y="15" width="60" height="40" rx="4" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="30" cy="22" r="3" fill="currentColor" fill-opacity="0.8"/>
    <circle cx="40" cy="22" r="3" fill="currentColor" fill-opacity="0.8"/>
    <!-- Screen Stand -->
    <path d="M 40 70 L 30 90 L 70 90 L 60 70 Z" fill="currentColor" fill-opacity="0.5"/>
  </g>

  <!-- Right OS Screen -->
  <g transform="translate(270, 40)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.7"/>
    <!-- Sidebar UI inside -->
    <rect x="0" y="0" width="25" height="70" rx="6" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="12.5" cy="15" r="4" fill="currentColor" fill-opacity="0.8"/>
    <circle cx="12.5" cy="30" r="4" fill="currentColor" fill-opacity="0.5"/>
    <circle cx="12.5" cy="45" r="4" fill="currentColor" fill-opacity="0.5"/>
    <!-- Screen Stand -->
    <path d="M 40 70 L 30 90 L 70 90 L 60 70 Z" fill="currentColor" fill-opacity="0.5"/>
  </g>
</svg>
