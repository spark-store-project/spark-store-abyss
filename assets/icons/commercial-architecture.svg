<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Connections -->
  <path d="M 200 150 L 100 100" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-opacity="0.3" stroke-dasharray="8 8" />
  <path d="M 200 150 L 300 100" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-opacity="0.3" stroke-dasharray="8 8" />
  <path d="M 200 150 L 200 240" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-opacity="0.3" stroke-dasharray="8 8" />

  <!-- Center Core -->
  <g transform="translate(200, 150)">
    <rect x="-40" y="-40" width="80" height="80" rx="16" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.8" transform="rotate(45)" />
    <circle cx="0" cy="0" r="20" fill="currentColor" fill-opacity="0.8" />
  </g>
  
  <!-- Left Chip (amd64) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.6" />
    <rect x="20" y="20" width="40" height="40" rx="6" fill="currentColor" fill-opacity="0.5" />
    <!-- Chip pins -->
    <path d="M -10 20 h 10 M -10 40 h 10 M -10 60 h 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M 80 20 h 10 M 80 40 h 10 M 80 60 h 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M 20 -10 v 10 M 40 -10 v 10 M 60 -10 v 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M 20 80 v 10 M 40 80 v 10 M 60 80 v 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Right Chip (arm64) -->
  <g transform="translate(260, 60)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.6" />
    <rect x="20" y="20" width="40" height="40" rx="6" fill="currentColor" fill-opacity="0.5" />
    <path d="M -10 20 h 10 M -10 40 h 10 M -10 60 h 10 M 80 20 h 10 M 80 40 h 10 M 80 60 h 10 M 20 -10 v 10 M 40 -10 v 10 M 60 -10 v 10 M 20 80 v 10 M 40 80 v 10 M 60 80 v 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Bottom Chip (loongarch64) -->
  <g transform="translate(160, 200)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="6" stroke-opacity="0.6" />
    <rect x="20" y="20" width="40" height="40" rx="6" fill="currentColor" fill-opacity="0.5" />
    <path d="M -10 20 h 10 M -10 40 h 10 M -10 60 h 10 M 80 20 h 10 M 80 40 h 10 M 80 60 h 10 M 20 -10 v 10 M 40 -10 v 10 M 60 -10 v 10 M 20 80 v 10 M 40 80 v 10 M 60 80 v 10" stroke="currentColor" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  </g>
